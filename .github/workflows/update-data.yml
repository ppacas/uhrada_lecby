name: Update drug data from SÚKL

on:
  schedule:
    # Run on the 28th of each month at 8:00 UTC
    # SÚKL publishes new SCAU on the 27th, valid from the 1st of next month
    - cron: '0 8 28 * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch data from SÚKL API
        run: python fetch_data.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/drugs.json
          git diff --cached --quiet || git commit -m "Aktualizace dat ze SÚKL ($(date +%Y-%m-%d))"
          git push
